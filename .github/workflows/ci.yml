name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy backend/

      - name: Test (pytest)
        run: uv run pytest tests/backend/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint (eslint)
        working-directory: ./frontend
        run: npm run lint

      - name: Type-check (tsc)
        working-directory: ./frontend
        run: npm run typecheck

      - name: Test (vitest)
        working-directory: ./frontend
        run: npm run test

      - name: Build (vite)
        working-directory: ./frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker buildx build -t hearth:ci-${{ github.sha }} --load .

      - name: Smoke test
        run: |
          docker run --rm -d -p 8080:8080 --name hearth-ci hearth:ci-${{ github.sha }}
          for i in {1..10}; do
            curl -fs http://localhost:8080/api/health && break || sleep 1
          done
          status=$(curl -fs -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || echo "000")
          docker stop hearth-ci
          if [ "$status" != "200" ]; then
            echo "ERROR: /api/health did not return 200 (got: $status)"
            exit 1
          fi
