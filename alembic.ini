# Alembic configuration file.
# This file is read by alembic commands run from the repo root.
# The sqlalchemy.url is intentionally commented out — it is set
# programmatically in backend/alembic/env.py from Settings.database_url.

[alembic]
script_location = backend/alembic
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Formatting options for auto-generated migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
# timezone =

prepend_sys_path = .
path_separator = os

# version location — default is versions/ relative to script_location
# version_locations = %(here)s/backend/alembic/versions

# version table name in the database
version_table = alembic_version

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
