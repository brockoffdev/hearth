services:
  hearth:
    build: .
    ports:
      - "8080:8080"
    environment:
      HEARTH_DEBUG: "false"
      # Use the /data volume mount for the SQLite file in production.
      # Four slashes = sqlite:// + absolute path /data/hearth.db
      HEARTH_DATABASE_URL: "sqlite+aiosqlite:////data/hearth.db"
      # Required: set HEARTH_SESSION_SECRET in your shell or a .env file before
      # running `docker compose up`.  Generate a value with:
      #   python -c "import secrets; print(secrets.token_urlsafe(32))"
      # For production, use Docker secrets or your deployment platform's secret
      # store.  Do NOT hardcode a value here.
      HEARTH_SESSION_SECRET: ${HEARTH_SESSION_SECRET:?HEARTH_SESSION_SECRET must be set — see README}
    volumes:
      - hearth-data:/data
    # depends_on:
    #   - ollama  # uncomment in Phase 5 when VLM is wired

  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   # for AMD ROCm: add devices: ['/dev/kfd', '/dev/dri'] and group_add per Ollama AMD docs

volumes:
  hearth-data:
  # ollama-data:
